<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>우리농 신규물품 자가진단 체크리스트</title>

  <!-- Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- marked.js: 마크다운 → HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- ───────── 헤더 ───────── -->
  <header class="site-header">
    <div class="container">
      <h1>우리농 신규물품 출하 준비</h1>
      <p class="site-sub">자가진단 체크리스트 (2026. 4. 19. 업데이트)</p>
    </div>
  </header>

  <!-- ───────── 메인 ───────── -->
  <main class="container">
    <div class="page-body">

      <div class="section-intro">
        <p class="intro-desc">물품사양서를 올리면, 출하에 필요한 서류와 주의사항을 안내해드려요.</p>
        <div class="notice-box">
          <p>※ 유의사항</p>
          <ul>
            <li>물품사양서의 모든 내용을 작성하신 후 자가진단을 실행해주세요.</li>
            <li>자가진단은 AI 기반 서비스로 호출 시마다 비용이 발생하므로, 불필요한 반복 실행은 삼가해주세요!</li>
          </ul>
        </div>
      </div>

      <form id="quick-form" class="upload-form">
        <label class="dropzone" id="quick-drop">
          <input type="file" name="pdf_file" id="quick-pdf" accept=".pdf" hidden>
          <div class="drop-content">
            <div class="icons">📄</div>
            <p><strong>물품사양서 PDF</strong></p>
            <p class="muted">여기에 끌어놓거나 클릭하여 선택</p>
            <p class="filename" id="quick-pdf-name"></p>
          </div>
        </label>
        <button type="submit" class="primary-btn" id="quick-submit-btn">진단 시작</button>
      </form>

      <!-- 결과 영역 -->
      <div id="quick-result-area" class="result-card" style="display:none;">
        <div id="quick-result-content"></div>
        <div class="result-actions" id="quick-result-actions" style="display:none;">
          <button type="button" class="copy-btn" onclick="copyRequest('quick')">📋 요청사항 복사</button>
          <button type="button" class="reanalyze-btn" onclick="reanalyze('quick')">🔄 새로 분석하기</button>
          <button type="button" class="reset-btn" onclick="resetForm('quick')">🆕 새 물품 분석하기</button>
        </div>
      </div>

    </div>
  </main>

  <!-- ───────── 푸터 ───────── -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-org">우리농촌살리기운동본부</p>
      <p>생산소비실무자회의 · 물품위원회</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
